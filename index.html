<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Appointment Bot</title>
  <style>
    * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body { background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
    .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; max-width: 500px; }
    h1 { color: #333; margin-bottom: 10px; }
    p { color: #666; margin-bottom: 30px; }
    .btn { display: inline-block; padding: 14px 30px; background: #4a90d9; color: white; text-decoration: none; border-radius: 8px; font-weight: 600; transition: background 0.2s; }
    .btn:hover { background: #357abd; }
    .api-box { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-top: 30px; text-align: left; }
    .api-box code { background: #e9ecef; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Voice Appointment Bot</h1>
    <p>Automated appointment booking system with voice input</p>
    <a href="/appointment-form.html" class="btn">Book an Appointment</a>
    <div class="api-box">
      <strong>API Endpoint:</strong><br>
      <code>https://voice-appointment-bot.onrender.com/appointments/confirm</code>
    </div>
  </div>
</body>
</html>
